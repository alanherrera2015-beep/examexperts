<svg xmlns="http://www.w3.org/2000/svg" width="4800" height="2800" viewBox="0 0 4800 2800" role="img" aria-label="Exam Experts door-to-door rep t-shirt design">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#21808d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.24"/>
    </filter>
    <style>
      .title { font: 900 180px 'Inter', 'Arial', sans-serif; letter-spacing: 2px; fill: #ffffff; }
      .subtitle { font: 700 74px 'Inter', 'Arial', sans-serif; fill: #ffffff; }
      .text { font: 600 56px 'Inter', 'Arial', sans-serif; fill: #eaf9ff; }
      .small { font: 500 44px 'Inter', 'Arial', sans-serif; fill: #eaf9ff; }
      .tag { font: 800 68px 'Inter', 'Arial', sans-serif; fill: #073b47; }
      .stat { font: 900 220px 'Inter', 'Arial', sans-serif; fill: #ffffff; letter-spacing: 2px; }
      .stat-sub { font: 700 72px 'Inter', 'Arial', sans-serif; fill: #ffffff; }
      .cta { font: 800 76px 'Inter', 'Arial', sans-serif; fill: #073b47; }
      .line { stroke: #ffffff; stroke-opacity: 0.36; stroke-width: 6; }
    </style>
  </defs>

  <rect width="4800" height="2800" fill="#0e1931"/>
  <rect x="90" y="90" width="4620" height="2620" rx="58" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Artboard labels -->
  <text x="320" y="320" class="subtitle" opacity="0.9">FRONT PRINT</text>
  <text x="2720" y="320" class="subtitle" opacity="0.9">BACK PRINT</text>
  <line x1="2400" y1="220" x2="2400" y2="2580" class="line"/>

  <!-- FRONT -->
  <rect x="270" y="420" width="1860" height="2090" rx="48" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.24" stroke-width="4"/>

  <circle cx="1200" cy="860" r="185" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.36" stroke-width="6"/>
  <path d="M1080 830 L1320 830 L1200 750 Z" fill="#ffffff"/>
  <rect x="1130" y="838" width="140" height="48" rx="10" fill="#ffffff"/>
  <rect x="1188" y="886" width="24" height="84" rx="8" fill="#ffffff"/>
  <circle cx="1200" cy="1005" r="18" fill="#ffffff"/>

  <text x="1200" y="1235" text-anchor="middle" class="title">EXAM EXPERTS</text>
  <text x="1200" y="1360" text-anchor="middle" class="subtitle">DOOR-TO-DOOR TEAM</text>

  <rect x="520" y="1480" width="1360" height="130" rx="65" fill="#ffffff"/>
  <text x="1200" y="1567" text-anchor="middle" class="tag">ASK ME HOW TO PASS</text>

  <text x="1200" y="1735" text-anchor="middle" class="text">NCLEX • SAT • ACT • GRE • MCAT</text>
  <text x="1200" y="1830" text-anchor="middle" class="text">Houston + Online Tutoring</text>

  <text x="1200" y="2020" text-anchor="middle" class="small">97% Success Rate • 200+ Students Helped</text>
  <text x="1200" y="2105" text-anchor="middle" class="small">examexperts.org</text>

  <!-- BACK -->
  <rect x="2670" y="420" width="1860" height="2090" rx="48" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.24" stroke-width="4"/>

  <text x="3600" y="860" text-anchor="middle" class="stat">97% PASS RATE</text>
  <text x="3600" y="980" text-anchor="middle" class="stat-sub">Trusted by 200+ Students</text>

  <line x1="2970" y1="1060" x2="4230" y2="1060" class="line"/>

  <text x="3600" y="1240" text-anchor="middle" class="subtitle">EXAM EXPERTS</text>
  <text x="3600" y="1350" text-anchor="middle" class="text">Houston + Online Tutoring</text>

  <rect x="3040" y="1450" width="1120" height="128" rx="64" fill="#ffffff"/>
  <text x="3600" y="1536" text-anchor="middle" class="cta">BOOK A FREE INTRO CALL</text>

  <text x="3600" y="1715" text-anchor="middle" class="text">281-541-5928</text>
  <text x="3600" y="1810" text-anchor="middle" class="text">examexperts.org</text>

  <text x="3600" y="2010" text-anchor="middle" class="small">Proven 5-Step Teaching Method</text>
  <text x="3600" y="2095" text-anchor="middle" class="small">Simple Analogy • Real Definition • Guided Mastery</text>
</svg>
