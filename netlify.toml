[build]
  publish = "."
  functions = "netlify/functions"

# Redirect www to non-www (canonical domain)
[[redirects]]
  from = "https://www.examexperts.org/*"
  to   = "https://examexperts.org/:splat"
  status = 301
  force  = true

# Redirect .html URLs to clean URLs (removes duplicate content for search engines)
[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301

[[redirects]]
  from = "/about.html"
  to   = "/about"
  status = 301

[[redirects]]
  from = "/approach.html"
  to   = "/approach"
  status = 301

[[redirects]]
  from = "/contact.html"
  to   = "/contact"
  status = 301

[[redirects]]
  from = "/pricing.html"
  to   = "/pricing"
  status = 301

[[redirects]]
  from = "/services.html"
  to   = "/services"
  status = 301

[[redirects]]
  from = "/houston-tutoring.html"
  to   = "/houston-tutoring"
  status = 301

[[redirects]]
  from = "/flyer.html"
  to   = "/flyer"
  status = 301

[[redirects]]
  from = "/flyer-media.html"
  to   = "/flyer-media"
  status = 301

[[redirects]]
  from = "/privacy-policy.html"
  to   = "/privacy-policy"
  status = 301

[[redirects]]
  from = "/resources/exam-risk-quiz.html"
  to   = "/resources/exam-risk-quiz"
  status = 301

[[redirects]]
  from = "/resources/7-day-study-plan.html"
  to   = "/resources/7-day-study-plan"
  status = 301

[[redirects]]
  from = "/resources/test-anxiety-toolkit.html"
  to   = "/resources/test-anxiety-toolkit"
  status = 301

[[plugins]]
  package = "@netlify/plugin-functions-install-core"
